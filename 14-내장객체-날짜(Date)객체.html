<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>14-내장객체-날짜(Date)객체</title>
  <style>
    #output {
      width: 400px;
      height: 100px;
      text-align: center;
      padding-top: 50px;
      border: 5px solid #000;
    }
  </style>
</head>
<body>
  
  <div id="output">
    <div id="date"></div>
  </div>


  <script>
    // let d = new Date();

    // console.log(d);
    // console.log(d.getMonth());
    // console.log(d.getFullYear());
    // console.log(d.getHours());
    // console.log(d.getMinutes());
    // console.log(d.getDay());

    let objDate = new Date();

    let year = objDate.getFullYear(); //년도구하기
    let month = objDate.getMonth();  //월구하기(index)->0(1월)부터 11(12월)까지의 정수값
    let date = objDate.getDate(); //일구하기
    let day = objDate.getDay(); //요일구하기(index)->0(일)부터 6(토)까지의 정수값
    let aryDay = ['일', '월', '화', '수', '목', '금', '토'];

    //년,월,일,요일 출력
    let fullDate = `${year}년 ${month+1}월 ${date}일 ${aryDay[day]}요일 `;
    //console.log(fullDate);
    document.querySelector('#date').textContent = fullDate;
  </script>
</body>
</html>
